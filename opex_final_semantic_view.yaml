- name: Compare Q1 this fiscal year vs Q1 last fiscal year by account hierarchy and list the biggest differences.
  question: Compare Q1 this fiscal year vs Q1 last fiscal year by account hierarchy and list the biggest differences.
  sql: |-
    WITH
      fy_bounds AS (
        SELECT
          CASE WHEN MONTH(CURRENT_DATE()) >= 10 THEN YEAR(CURRENT_DATE())     ELSE YEAR(CURRENT_DATE()) - 1 END || '-10' AS fy_start,
          CASE WHEN MONTH(CURRENT_DATE()) >= 10 THEN YEAR(CURRENT_DATE()) + 1 ELSE YEAR(CURRENT_DATE())     END || '-09' AS fy_end,
          CASE WHEN MONTH(CURRENT_DATE()) >= 10 THEN YEAR(CURRENT_DATE()) - 1 ELSE YEAR(CURRENT_DATE()) - 2 END || '-10' AS pfy_start,
          CASE WHEN MONTH(CURRENT_DATE()) >= 10 THEN YEAR(CURRENT_DATE())     ELSE YEAR(CURRENT_DATE()) - 1 END || '-09' AS pfy_end
      ),
      cur AS (SELECT CASE WHEN MONTH(CURRENT_DATE()) >= 10 THEN YEAR(CURRENT_DATE()) + 1 ELSE YEAR(CURRENT_DATE()) END AS fy)
    SELECT
      a.ACCOUNT_LEVEL_2, a.ACCOUNT_LEVEL_3, a.ACCOUNT_CODE_AND_DESC AS ACCOUNT,
      SUM(CASE WHEN d.FISC_YEAR = cur.fy     AND d.FISC_QTR = 'Q1' THEN f.VAL_EUR_NORM ELSE 0 END) AS PERIOD_A,
      SUM(CASE WHEN d.FISC_YEAR = cur.fy - 1 AND d.FISC_QTR = 'Q1' THEN f.VAL_EUR_NORM ELSE 0 END) AS PERIOD_B,
      SUM(CASE WHEN d.FISC_YEAR = cur.fy     AND d.FISC_QTR = 'Q1' THEN f.VAL_EUR_NORM ELSE 0 END)
        - SUM(CASE WHEN d.FISC_YEAR = cur.fy - 1 AND d.FISC_QTR = 'Q1' THEN f.VAL_EUR_NORM ELSE 0 END) AS DIFFERENCE
    FROM ACC_PRD.COST_CENTER.VW_JEDOX_DATA_OPEX f
    CROSS JOIN cur
    JOIN ACC_PRD.MASTERDATA.VW_FISCAL_DATE d ON f.TIME = d.CAL_YEAR_MONTH_NUM
    JOIN ACC_PRD.MASTERDATA.VW_JEDOX_MASTER_DATA_ACCOUNT a ON f.ACCOUNT = a.ACCOUNT_CODE
    WHERE f.VERSION = 'Actual'
      AND a.ACCOUNT_LEVEL_1 = 'OPEX'
      AND d.FISC_QTR = 'Q1'
    GROUP BY 1, 2, 3
    HAVING ABS(DIFFERENCE) > 0
    ORDER BY DIFFERENCE DESC
