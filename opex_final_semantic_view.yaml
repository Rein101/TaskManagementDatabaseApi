      f.VERSION = 'Actual'
      AND (
        f.TIME IN (
          SELECT
            TIME
          FROM
            current_fy_periods
        )
        OR f.TIME IN (
          SELECT
            TIME
          FROM
            prior_fy_periods
        )
      )
      AND cc.COST_CENTER_LEVEL_1 = 'All Cost Centers'
      AND cc.COST_CENTER_LEVEL_2 = 'By Owner'
    GROUP BY
      1,
      2,
      3
    HAVING
      ABS(YOY_CHANGE) > 0
    ORDER BY
      YOY_CHANGE DESC
