      SUM(CASE WHEN f.TIME IN (SELECT TIME FROM current_fy_periods) THEN f.VAL_EUR_NORM ELSE 0 END) AS CURRENT_FY_ACTUAL,
      SUM(CASE WHEN f.TIME IN (SELECT TIME FROM prior_fy_periods)   THEN f.VAL_EUR_NORM ELSE 0 END) AS PRIOR_FY_ACTUAL,
      SUM(CASE WHEN f.TIME IN (SELECT TIME FROM current_fy_periods) THEN f.VAL_EUR_NORM ELSE 0 END)
