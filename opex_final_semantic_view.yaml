- name: What is driving costs? Full diagnostic across accounts, cost centers, and entities.
  sql: |-
    SELECT
      a.ACCOUNT_LEVEL_2 AS ACCOUNT_GROUP,
      a.ACCOUNT_LEVEL_3 AS ACCOUNT_SUBGROUP,
      c.COST_CENTER_LEVEL_2 AS CC_GROUP,
      e.ENTITY_LEVEL_2 AS ENTITY_REGION,
      SUM(CASE WHEN f.VERSION = 'Actual' THEN f.VAL_EUR_NORM ELSE 0 END) AS ACTUAL,
      SUM(CASE WHEN f.VERSION = 'Budget X' THEN f.VAL_EUR_NORM ELSE 0 END) AS BUDGET,
      SUM(CASE WHEN f.VERSION = 'Actual' THEN f.VAL_EUR_NORM ELSE 0 END)
        - SUM(CASE WHEN f.VERSION = 'Budget X' THEN f.VAL_EUR_NORM ELSE 0 END) AS VARIANCE,
      ROUND(
        (SUM(CASE WHEN f.VERSION = 'Actual' THEN f.VAL_EUR_NORM ELSE 0 END)
         - SUM(CASE WHEN f.VERSION = 'Budget X' THEN f.VAL_EUR_NORM ELSE 0 END))
        / NULLIF(SUM(CASE WHEN f.VERSION = 'Budget X' THEN f.VAL_EUR_NORM ELSE 0 END), 0) * 100
      , 1) AS VARIANCE_PCT
    FROM ACC_PRD.COST_CENTER.VW_JEDOX_DATA_OPEX f
    JOIN ACC_PRD.MASTERDATA.VW_JEDOX_MASTER_DATA_ACCOUNT a ON f.ACCOUNT = a.ACCOUNT_CODE
    JOIN ACC_PRD.MASTERDATA.VW_JEDOX_MASTER_DATA_COST_CENTER c ON f.COST_CENTER = c.COST_CENTER_CODE
    JOIN ACC_PRD.MASTERDATA.VW_JEDOX_MASTER_DATA_ENTITY e ON f.ENTITY = e.ENTITY_CODE
    WHERE f.VERSION IN ('Actual', 'Budget X')
      AND a.ACCOUNT_LEVEL_1 = 'OPEX'
      AND c.COST_CENTER_LEVEL_1 = 'All Cost Centers'
