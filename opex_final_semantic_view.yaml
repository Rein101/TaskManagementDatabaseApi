- name: VW_JEDOX_MASTER_DATA_PROFIT_CENTER
  description: The table contains master data records for profit centers used in financial reporting. Each record represents a single profit center and includes its identifying code and description, along with its position across multiple levels of a hierarchical organizational structure.
  base_table:
    database: ACC_PRD
    schema: MASTERDATA
    table: VW_JEDOX_MASTER_DATA_PROFIT_CENTER
  dimensions:
  - name: PROFIT_CENTER_CODE
    description: Unique profit center identifier. Primary key. Joins to PROFIT_CENTER in the fact table. The unique code identifying a profit center.
    expr: PROFIT_CENTER_CODE
    data_type: VARCHAR(16777216)
    sample_values:
    - '1310811'
    - '10011541'
    - '10011531'
  - name: PROFIT_CENTER_CODE_AND_DESC
    description: Profit center code with description (e.g. '10011541 - NGDS Adaptive'). Use in final output for readability. The profit center code combined with its description, typically formatted as a concatenated identifier and label.
    expr: PROFIT_CENTER_CODE_AND_DESC
    data_type: VARCHAR(16777216)
    sample_values:
    - 10011541 - NGDS Adaptive
    - 10230021 - AOI - Oncology Treatment Provider
    - 25000000 - Non-Product Related
  - name: PROFIT_CENTER_LEVEL_1
    description: Top-level profit center rollup. Always filter to 'All Profit Center' to prevent double-counting.
    expr: PROFIT_CENTER_LEVEL_1
    data_type: VARCHAR(16777216)
    sample_values:
    - All Profit Center
    is_enum: true
  - name: PROFIT_CENTER_LEVEL_2
    description: 'Second level: business segments. Values: Central Item, IO, Product, Service, etc. The name or identifier of a profit center at the second level of the organizational hierarchy.'
    expr: PROFIT_CENTER_LEVEL_2
    data_type: VARCHAR(16777216)
    sample_values:
    - Central Item
    - IO
  - name: PROFIT_CENTER_LEVEL_3
    description: 'Third level: product/service lines. Values: In vivo Others IO, Asiri, etc. The name or identifier of a profit center at hierarchy level 3.'
    expr: PROFIT_CENTER_LEVEL_3
    data_type: VARCHAR(16777216)
    sample_values:
    - In vivo Others IO
    - Asiri
  - name: PROFIT_CENTER_LEVEL_4
    description: |
      Fourth level: specific business units or product groups. Values: AOS General Global, AOS Regions, ARIA, Eclipse, Field Service ROS, HW, Global Functions, etc. Most granular named level before profit center codes.
    expr: PROFIT_CENTER_LEVEL_4
    data_type: VARCHAR(16777216)
    sample_values:
    - CCPS General Global
    - AOS General Global
  facts:
  - name: ALL_PROFIT_CENTERS_SCOPE
    description: 'MANDATORY: Always apply PROFIT_CENTER_LEVEL_1 = ''All Profit Center'' in every query unless the user explicitly requests ''Alt for MDO'', ''Alt for ROS'', or ''SHS VAR''.'
    expr: PROFIT_CENTER_LEVEL_1 IN ('All Profit Center', 'Alt for MDO', 'Alt for ROS', 'SHS VAR')
    data_type: BOOLEAN
    access_modifier: public_access
    labels:
    - filter
  primary_key:
    columns:
    - PROFIT_CENTER_CODE
