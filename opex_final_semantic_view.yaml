name: OPEX_COST_CENTER_AI
tables:
- name: VW_FISCAL_DATE
  description: The table contains records of fiscal and calendar date mappings, serving as a date dimension reference. Each record represents a single date and includes both calendar attributes (day, week, month, year) and fiscal attributes (week, month, period, quarter, year). Fiscal calendar dimension. The fiscal year starts in OCTOBER and ends in SEPTEMBER. FY2026 runs from October 2025 through September 2026. The TIME column (YYYY-MM format) in the fact table joins to CAL_YEAR_MONTH_NUM in this table.
  base_table:
    database: ACC_PRD
    schema: MASTERDATA
    table: VW_FISCAL_DATE
  dimensions:
  - name: CAL_YEAR_MONTH_NUM
    description: |
      The calendar year and month represented as a numeric value in a combined format (e.g., YYYY-MM). Fiscal year-month in YYYY-MM format. Joins to the TIME column in VW_JEDOX_DATA_OPEX.
    expr: CAL_YEAR_MONTH_NUM
    data_type: VARCHAR(8)
    sample_values:
    - 2001-01
    - 2001-02
    - 2001-08
  - name: FISCAL_MONTH
    description: The fiscal month represented as a three-character code e.g. Jan. Fiscal month in MMM format. First month of a fiscal year is always Oct.
    expr: FISC_MONTH
    data_type: VARCHAR(3)
    sample_values:
    - Jan
    - Mar
    - Feb
  - name: FISCAL_PERIOD
    description: The fiscal period number within the fiscal year.
    expr: FISC_PERIOD
    data_type: NUMBER(10,0)
    sample_values:
    - '4'
    - '6'
    - '5'
  - name: FISCAL_QTR
    description: The fiscal quarter represented as a two-character code e.g. Q1. Fiscal quarter. Q1 = Oct-Dec, Q2 = Jan-Mar, Q3 = Apr-Jun, Q4 = Jul-Sep.
    expr: FISC_QTR
    data_type: VARCHAR(2)
    sample_values:
    - Q3
    - Q4
    - Q2
    - Q1
  - name: FISCAL_YEAR
    description: 'Fiscal year number. FY starts in October. FISC_YEAR 2026 covers October 2025 through September 2026. FISC_YEAR 2025 covers October 2024 through September 2025. FISC_YEAR 2024 covers October 2023 through September 2024. and so on. '
    expr: FISC_YEAR
    data_type: NUMBER(10,0)
    sample_values:
    - '2001'
    - '2002'
    - '2003'
  - name: FISCAL_YEAR_PERIOD
    description: The fiscal year period, combining the fiscal year and period into a single identifier (e.g., "2023001").
    expr: FISC_YEAR_PERIOD
    data_type: VARCHAR(8)
    sample_values:
    - 2001-006
    - 2001-011
    - 2001-004
  facts:
  - name: RECENT_FISCAL_YEARS
    description: |
      MANDATORY: Always filter to the current fiscal year by default. Include prior years only if the user asks for trend, comparison, or historical data.
    expr: FISC_YEAR >= YEAR(CURRENT_DATE()) - 2
    data_type: BOOLEAN
    access_modifier: public_access
    labels:
    - filter
  primary_key:
    columns:
    - CAL_YEAR_MONTH_NUM
- name: VW_JEDOX_DATA_OPEX
  synonyms:
  - COST_DATA_VIEW
  - JEDOX_COST_VIEW
  - JEDOX_OPERATING_EXPENSES
  - JEDOX_OPEX
  - OPERATING_COST_DATA
  - OPERATING_EXPENDITURE_DATA
  - OPERATIONAL_EXPENSES_VIEW
  - OPEX_DATA
  - OPEX_FINANCIALS
  - OPEX_REPORTING
  description: 'The table contains records of operational expenditure (OPEX) financial data, likely sourced from a planning or reporting tool. Each record captures cost and value measures across multiple currencies (USD, EUR, and local currency), organized by dimensions such as cost center, profit center, functional area, region, project, and account. OPEX fact table containing financial actuals, budgets, and forecasts. The TIME column is in YYYY-MM format (e.g. ''2026-03'' = March 2026). Fiscal year starts in October: FY2026 = ''2025-10'' through ''2026-09''. When no time period is specified, default to the current fiscal year.'
  base_table:
    database: ACC_PRD
    schema: COST_CENTER
    table: VW_JEDOX_DATA_OPEX
  dimensions:
  - name: ACCOUNT_NUMBER
    description: GL account code. Joins to ACCOUNT_CODE in VW_JEDOX_MASTER_DATA_ACCOUNT for hierarchy and descriptions. The general ledger account identifier associated with operational expenditure (OPEX) cost center data.
    expr: ACCOUNT
    data_type: VARCHAR(16777216)
    sample_values:
    - '600599'
    - '600601'
    - '600598'
  - name: COST_CENTER
    description: Cost center code. Joins to COST_CENTER_CODE in VW_JEDOX_MASTER_DATA_COST_CENTER for hierarchy and descriptions. The cost center code identifying the organizational unit responsible for tracking operational expenditures.
    expr: COST_CENTER
    data_type: VARCHAR(16777216)
    sample_values:
    - 450171U6Z
    - 450473U8Q
    - 450171U3N
  - name: CURRENCY
    description: Transaction currency for VAL_LC. ALWAYS GROUP BY CURRENCY when using VAL_LC; never sum VAL_LC across currencies. Use VAL_EUR_NORM for all standard cross-currency aggregations.
    expr: CURRENCY
    data_type: VARCHAR(16777216)
    sample_values:
    - EUR
    - USD
    - GBP
    - CHF
    - PLN
    - INR
    - SGD
    is_enum: true
  - name: ENTITY
    description: Legal entity code. Joins to ENTITY_CODE in VW_JEDOX_MASTER_DATA_ENTITY for geography and hierarchy. The organizational entity or business unit associated with the operational expenditure (OPEX) record.
    expr: ENTITY
    data_type: VARCHAR(16777216)
    sample_values:
    - E0392
    - E0245
    - E0393
  - name: FUNCTIONAL_AREA
    description: Functional area code. Joins to FUNC_AREA_CODE in VW_JEDOX_MASTER_DATA_FUNC_AREA for reporting classification. The functional area associated with the operational expenditure (OPEX) cost center entry.
    expr: FUNCTIONAL_AREA
    data_type: VARCHAR(16777216)
    sample_values:
    - F000
    - F620
    - F460
  - name: FX_TYPE
    description: Foreign exchange type. Always 'Translated'. Single-valued, no filtering needed. The type of foreign exchange (FX) used in the operational expenditure (OPEX) data.
    expr: FX_TYPE
    data_type: VARCHAR(16777216)
    sample_values:
    - Translated
  - name: MEASURE
    description: Always 'Value'. Single-valued dimension, no filtering needed. The name or identifier of the operational expenditure (OPEX) financial measure being tracked or reported.
    expr: MEASURE
    data_type: VARCHAR(16777216)
    sample_values:
    - Value
  - name: PROFIT_CENTER
    description: Profit center code. Joins to PROFIT_CENTER_CODE in VW_JEDOX_MASTER_DATA_PROFIT_CENTER for business unit hierarchy. The profit center associated with the operational expenditure record.
    expr: PROFIT_CENTER
    data_type: VARCHAR(16777216)
    sample_values:
    - '13098000'
    - '10130000'
    - '10131101'
  - name: PROJECT
    description: Project name associated with the expenditure. Use for project-specific cost analysis. The name or identifier of the project associated with the operational expenditure entry.
    expr: PROJECT
    data_type: VARCHAR(16777216)
    sample_values:
    - Palo Alto -  Maintenance B3-Electrical Upgrade
    - San Jose - Satellite Manufacturing Site
    - No Project
  - name: REGION
    description: Geographic region code. Usually '~' (not populated). Use ENTITY dimension for geographic analysis instead. The geographic region associated with the operational expenditure (OPEX) cost center data.
    expr: REGION
    data_type: VARCHAR(16777216)
    sample_values:
    - '~'
  - name: TIME
    description: The time period associated with the operational expenditure (OPEX) data entry. Period in YYYY-MM format. Fiscal year starts in October. FY2026 = '2025-10' to '2026-09'. FY2025 = '2024-10' to '2025-09'. FY2024 = '2023-10' to '2024-09'. When user says 'this year' or 'current year', use FY2026.
    expr: TIME
    data_type: VARCHAR(16777216)
    sample_values:
    - 2024-10
    - 2026-09
    - 2025-03
  - name: VERSION
    description: 'Data version. Core values: ''Actual'' (closed accounting), ''Budget X'' (annual plan), and forecast versions matching pattern ''FY## FCST P##'' (e.g. ''FY26 FCST P07''). ALWAYS filter to a specific version — never aggregate across versions. To get the latest forecast use MAX(VERSION) WHERE VERSION ILIKE ''FY% FCST P%''.'
    expr: VERSION
    data_type: VARCHAR(16777216)
    sample_values:
    - Actual
    - Budget X
    - FY26 FCST P01
    - FY26 FCST P07
  - name: WORKFLOW
    description: Data source workflow (e.g. 'From OPEX', 'ECC', 'Manual'). Indicates where the data originated. Rarely needed for reporting. The workflow stage or process associated with the operational expenditure entry.
    expr: WORKFLOW
    data_type: VARCHAR(16777216)
    sample_values:
    - From OPEX
    - ECC
    - Manual
  time_dimensions:
  - name: LAST_REFRESH
    description: The date and time when the data was last refreshed, stored without timezone information.
    expr: LAST_REFRESH
    data_type: TIMESTAMP_NTZ(9)
    sample_values:
    - '2026-05-27T08:21:34.250Z'
  facts:
  - name: SHS_AVG_MNTHLY_FX_RATE_EUR
    description: The average monthly foreign exchange rate in Euros (EUR) for Swiss Headquarters (SHS).
    expr: SHS_AVG_MNTHLY_FX_RATE_EUR
    data_type: NUMBER(38,20)
    access_modifier: public_access
    sample_values:
    - '1.00000000000000000000'
    - '0.91026000000000000000'
    - '1.17675000000000000000'
  - name: VAL_EUR
    description: The value in Euros (non-normalized). Only use when the user explicitly asks for 'EUR' or 'non-normalized euros'.
    expr: VAL_EUR
    data_type: FLOAT
    access_modifier: public_access
    sample_values:
    - '33.17392875'
    - '927.72'
    - '-40.481883497'
  - name: VAL_EUR_NORM
    description: 'Mandatory: THIS IS THE DEFAULT VALUE COLUMN. Always use VAL_EUR_NORM unless the user explicitly requests a different currency (USD, EUR, or Local Currency). The normalized value in Euros. '
    expr: VAL_EUR_NORM
    data_type: FLOAT
    access_modifier: public_access
    sample_values:
    - '2398.511436867'
    - '2905.170850615'
    - '1278.844274485'
  - name: VAL_LC
    synonyms:
    - LC
    - local currency
    description: 'Value in local currency. Only use when user explicitly asks for ''local currency'' or ''LC''. MANDATORY: When using VAL_LC, ALWAYS include CURRENCY in the GROUP BY and SELECT — never sum VAL_LC across different currencies as the result would be meaningless. Show each currency separately.'
    expr: VAL_LC
    data_type: FLOAT
    access_modifier: public_access
    sample_values:
    - '174.606291667'
    - '335'
    - '10.94'
  - name: VAL_USD_INI
    synonyms:
    - dollars
    - US Dollar
    - USD
    - USD INI
    description: The value in US Dollars. Only use when the user explicitly asks for 'USD' or 'dollars'.
    expr: VAL_USD_INI
    data_type: FLOAT
    access_modifier: public_access
    sample_values:
    - '13739.39876641'
    - '7703.425082379'
    - '2430.074922023'
  - name: VERSION_ACTUAL
    description: |
      MANDATORY: Always filter to VERSION = 'Actual' in every query unless the user explicitly asks for Budget, Forecast, or a specific version like 'FY26 FCST P01'.
    expr: VERSION = 'Actual'
    data_type: BOOLEAN
    access_modifier: public_access
    labels:
    - filter
  metrics:
  - name: TOTAL_OPEX_EUR
    synonyms:
    - total spend
    - total cost
    - total opex
    description: 'Headline measure: SUM of normalized EUR (VAL_EUR_NORM). Honors whatever VERSION/scope filters are applied. For a clean actuals figure, combine with the Actual version filter or use ACTUAL_EUR.'
    expr: SUM(VAL_EUR_NORM)
    access_modifier: public_access
  - name: ACTUAL_EUR
    synonyms:
    - actuals
    - actual spend
    description: SUM of normalized EUR where VERSION = 'Actual'. The ACT side of ACT vs FCST and ACT vs Budget.
    expr: SUM(CASE WHEN VERSION = 'Actual' THEN VAL_EUR_NORM ELSE 0 END)
    access_modifier: public_access
  - name: BUDGET_EUR
    synonyms:
    - budget
    - budgeted spend
    description: SUM of normalized EUR where VERSION = 'Budget X'.
    expr: SUM(CASE WHEN VERSION = 'Budget X' THEN VAL_EUR_NORM ELSE 0 END)
    access_modifier: public_access
- name: VW_JEDOX_MASTER_DATA_ACCOUNT
  description: The table contains master data records for financial accounts used in planning and reporting. Each record represents a single account and includes details about account classification, status, and hierarchical groupings across multiple levels.
  base_table:
    database: ACC_PRD
    schema: MASTERDATA
    table: VW_JEDOX_MASTER_DATA_ACCOUNT
  dimensions:
  - name: ACCOUNT_CODE
    description: Unique GL account identifier. Primary key. Joins to ACCOUNT in the fact table. The unique code identifying an account.
    expr: ACCOUNT_CODE
    data_type: VARCHAR(16777216)
    sample_values:
    - '829077'
    - '415077'
    - '411179'
  - name: ACCOUNT_CODE_AND_DESC
    description: Account code concatenated with its description (e.g. '600110 - Labor - Administrative'). Use in final output for readability. The account code combined with its description, typically formatted as a concatenated identifier and label.
    expr: ACCOUNT_CODE_AND_DESC
    data_type: VARCHAR(16777216)
    sample_values:
    - 601698 - R&D grant from 3rd party - reduction of expenses
    - 981635 - Project Revenue Setl to COPA - Revenue SVC
    - 981210 - Service Settlement to Order
  - name: ACCOUNT_LEVEL_1
    description: Top account category. 'OPEX' = operating expense money accounts — the default scope. 'Statistical Accounts' = FTE/headcount counts (NOT money; never sum with EUR). Filter to 'OPEX' unless the user explicitly asks for headcount or another category.
    expr: ACCOUNT_LEVEL_1
    data_type: VARCHAR(16777216)
    sample_values:
    - OPEX
    - Statistical Accounts
    - Capex Depreciation
    - Functions Gross Cost excl. ISA
    - To Be Mapped
    - All Accounts
    is_enum: true
  - name: ACCOUNT_LEVEL_2
    synonyms:
    - accounts level 2
    - drill down to level 2
    - level 2
    - second drill down
    - second level
    description: 'Second level: major expense categories (e.g. Employee Related, Fixed Cost, Variable Spend).'
    expr: ACCOUNT_LEVEL_2
    data_type: VARCHAR(16777216)
    sample_values:
    - HC Unit
    - Headcount
  - name: ACCOUNT_LEVEL_3
    description: 'Cost-type sub-category (3rd level). Key values: ''Compensation'' (employee salaries + benefits), ''Consulting'' (external advisory), ''Tech Cost'' (technology spend), ''Contractor'' (external headcount), ''Travel and Entertainment'' (T&E). Use exact spelling for filtering.'
    expr: ACCOUNT_LEVEL_3
    data_type: VARCHAR(16777216)
    sample_values:
    - Compensation
    - Consulting
    - Tech Cost
    - Contractor
    - Travel and Entertainment
    - Facilities
    - Software
    - Hardware
    - Training
    - Marketing
  - name: ACCOUNT_LEVEL_4
    description: 'Fourth level: most detailed named category (e.g. Salary, Bonus, T&E, Conferences).'
    expr: ACCOUNT_LEVEL_4
    data_type: VARCHAR(16777216)
    sample_values:
    - Taxes
    - Business Services
    - Communications
  - name: ACCOUNT_LEVEL_5
    description: 'Fifth level: further sub-detail where applicable (e.g. Employee FTE Regular - Direct). Not all accounts have this level populated.'
    expr: ACCOUNT_LEVEL_5
    data_type: VARCHAR(16777216)
    sample_values:
    - Employee FTE Regular - Direct
    - Employee FTE Fixed Term - Direct
  - name: ACCOUNT_LEVEL_1_IS_OPEX
    synonyms:
    - opex accounts
    - operating expense accounts
    description: TRUE when the account belongs to the OPEX category.
    expr: ACCOUNT_LEVEL_1 = 'OPEX'
    data_type: BOOLEAN
    labels:
    - filter
  - name: ACCOUNT_LEVEL_1_IS_STAT
    synonyms:
    - statistical accounts
    - headcount accounts
    - fte accounts
    description: TRUE when the account is a Statistical Account (FTE/headcount). These are counts, not money.
    expr: ACCOUNT_LEVEL_1 = 'Statistical Accounts'
    data_type: BOOLEAN
    labels:
    - filter
  facts:
  - name: OPEX_ACCOUNTS
    description: |
      MANDATORY: Always apply ACCOUNT_LEVEL_1 = 'OPEX' in every query unless the user explicitly requests 'All Accounts' or 'Functions Gross Cost excluding ISA'.
    expr: ACCOUNT_LEVEL_1 IN ('OPEX', 'Functions Gross Cost excl. ISA', 'All Accounts')
    data_type: BOOLEAN
    access_modifier: public_access
    labels:
    - filter
  primary_key:
    columns:
    - ACCOUNT_CODE
- name: VW_JEDOX_MASTER_DATA_COST_CENTER
  description: The table contains master data records for cost centers used in financial planning and reporting. Each record describes a single cost center, including its identifying details, organizational attributes such as business area, entity, function, and associated profit center, as well as its position within a multi-level organizational hierarchy.
  base_table:
    database: ACC_PRD
    schema: MASTERDATA
    table: VW_JEDOX_MASTER_DATA_COST_CENTER
  dimensions:
  - name: COST_CENTER_CODE
    description: Unique cost center identifier. Primary key. Joins to COST_CENTER in the fact table. The unique code identifying a cost center.
    expr: COST_CENTER_CODE
    data_type: VARCHAR(16777216)
    sample_values:
    - 400009CH1
    - '0600'
    - 708001CN1
  - name: COST_CENTER_CODE_AND_DESC
    description: Cost center code with description (e.g. '300701US1 - VIS - Sales'). Use in final output for readability. The combined cost center code and its corresponding description.
    expr: COST_CENTER_CODE_AND_DESC
    data_type: VARCHAR(16777216)
    sample_values:
    - 45070NL1 -
    - 400009CH1 -
    - 708001CN1 - ICB Tubes Sub-Assembly-inactive
  - name: COST_CENTER_LEVEL_1
    synonyms:
    - cost center level 1
    - cost centers 1
    description: Top-level cost center rollup. Always filter to 'All Cost Centers' to avoid double-counting when summarizing across the hierarchy.
    expr: COST_CENTER_LEVEL_1
    data_type: VARCHAR(16777216)
    sample_values:
    - All Cost Centers
    is_enum: true
  - name: COST_CENTER_LEVEL_2
    synonyms:
    - costc
    description: 'Second level: organizational divisions (e.g. By Owner, Regions, Corporate).'
    expr: COST_CENTER_LEVEL_2
    data_type: VARCHAR(16777216)
    sample_values:
    - By Owners
    - Corporate
    - Regions
  - name: COST_CENTER_LEVEL_3
    description: 'Third level: departments or functions within a division.'
    expr: COST_CENTER_LEVEL_3
    data_type: VARCHAR(16777216)
    sample_values:
    - VIS
    - US_Equipment
    - HU_Equipment
  - name: COST_CENTER_LEVEL_4
    description: 'Team or sub-team segment at level 4 of the cost center hierarchy. Common values: ''AMS'' (Americas), ''EMEA'', ''APAC'', ''Global SVC''. Used for team-level filtering in U+4 reporting.'
    expr: COST_CENTER_LEVEL_4
    data_type: VARCHAR(16777216)
    sample_values:
    - AMS
    - EMEA
    - APAC
    - Global SVC
    - Corporate
  facts:
  - name: ALL_COST_CENTERS_SCOPE
    description: Always filter to COST_CENTER_LEVEL_1 = 'All Cost Centers' by default. Only include 'GEO Service' if the user explicitly asks for GEO Service data.
    expr: COST_CENTER_LEVEL_1 IN ('All Cost Centers', 'GEO Service')
    data_type: BOOLEAN
    access_modifier: public_access
    labels:
    - filter
  primary_key:
    columns:
    - COST_CENTER_CODE
- name: VW_JEDOX_MASTER_DATA_ENTITY
  description: The table contains master data records for organizational entities. Each record describes a single entity and includes details about its geographic attributes such as country and currency, as well as its position within a multi-level organizational hierarchy.
  base_table:
    database: ACC_PRD
    schema: MASTERDATA
    table: VW_JEDOX_MASTER_DATA_ENTITY
  dimensions:
  - name: ENTITY_CODE
    description: Unique legal entity identifier (e.g. E0530). Primary key. Joins to ENTITY in the fact table. Unique legal entity identifier (e.g. E0530). Primary key. Joins to ENTITY in the fact table.
    expr: ENTITY_CODE
    data_type: VARCHAR(16777216)
    sample_values:
    - E0530
    - E0020
    - E0531
  - name: ENTITY_CODE_AND_DESC
    description: Entity code with name (e.g. 'E0530 - Varinak Bulgaria EOOD'). Use in final output for readability. The combined entity code and description, typically concatenating a unique identifier with its corresponding human-readable label.
    expr: ENTITY_CODE_AND_DESC
    data_type: VARCHAR(16777216)
    sample_values:
    - E0530 - Varinak Bulgaria EOOD
    - E0528 - VMS Iberica SL Portugal
    - E0531 - Varinak Europe S.R.L.
  - name: ENTITY_LEVEL_1
    description: Top-level entity rollup. Filter to 'Worldwide' to avoid regional double-counting. Override only when user explicitly asks for a specific region or country.
    expr: ENTITY_LEVEL_1
    data_type: VARCHAR(16777216)
    sample_values:
    - Worldwide
    is_enum: true
  - name: ENTITY_LEVEL_2
    description: Region-level entity grouping (level 2 of entity hierarchy).
    expr: ENTITY_LEVEL_2
    data_type: VARCHAR(16777216)
    sample_values:
    - Americas
    - EMEA
    - APAC
    - Corporate
  - name: ENTITY_LEVEL_3
    description: 'Second level: major geographic regions. Values: Asia Pacific, Americas, EMEIA, Other, Corporate. The third hierarchical level of the entity classification within the master data structure.'
    expr: ENTITY_LEVEL_3
    data_type: VARCHAR(16777216)
    sample_values:
    - APJI
    - EMEIA w/o VPS DE
  - name: ENTITY_LEVEL_4
    description: |-
      Fourth level: individual countries. Values: Australia, Brazil, Canada, China, Germany, India, Japan, etc. Most granular named level before entity codes.
       The fourth hierarchical level of the entity classification structure.
    expr: ENTITY_LEVEL_4
    data_type: VARCHAR(16777216)
    sample_values:
    - Taiwan
    - Hongkong
  facts:
  - name: WORLDWIDE_SCOPE
    description: 'Mandatory: Always filter to ENTITY_LEVEL_1 = ''Worldwide'' by default. Only include ''AREs for HOP'' if the user explicitly asks for Areas for HOP data.'
    expr: ENTITY_LEVEL_1 IN ('Worldwide', 'AREs for HOP')
    data_type: BOOLEAN
    access_modifier: public_access
    labels:
    - filter
  primary_key:
    columns:
    - ENTITY_CODE
- name: VW_JEDOX_MASTER_DATA_FUNC_AREA
  synonyms:
  - Functional area
  description: The table contains master data records for functional areas used in financial or organizational planning. Each record represents a single functional area and includes its code, description, and hierarchical classification across multiple levels. functional area
  base_table:
    database: ACC_PRD
    schema: MASTERDATA
    table: VW_JEDOX_MASTER_DATA_FUNC_AREA
  dimensions:
  - name: FUNC_AREA_CODE
    description: Unique functional area code (e.g. F000, F620). Primary key. Joins to FUNCTIONAL_AREA in the fact table. The alphanumeric code identifying a functional area.
    expr: FUNC_AREA_CODE
    data_type: VARCHAR(16777216)
    sample_values:
    - F800
    - F000
    - F820
  - name: FUNC_AREA_CODE_AND_DESC
    description: Functional area code with label (e.g. 'F620 - R&D'). Use in final output for readability. The functional area code combined with its description, typically formatted as a concatenated identifier and label.
    expr: FUNC_AREA_CODE_AND_DESC
    data_type: VARCHAR(16777216)
    sample_values:
    - F000 - Default Functional Area
    - F840 - Interest Inc/(Exp)
    - F800 - OIE
  - name: FUNC_AREA_LEVEL_1
    description: 'Functional area rollup (level 1). Default: ''Internal Reporting''. Change to ''Internal Reporting Excluding OIE'' only when user asks to exclude Other Income/Expense items.'
    expr: FUNC_AREA_LEVEL_1
    data_type: VARCHAR(16777216)
    sample_values:
    - Internal Reporting
    - Internal Reporting Excluding OIE
    is_enum: true
  - name: FUNC_AREA_LEVEL_2
    description: 'Second level: major functional classifications. Values: R&D, SG&A, Gross Margin, Corp Allocation. The second hierarchical level of the functional area classification.'
    expr: FUNC_AREA_LEVEL_2
    data_type: VARCHAR(16777216)
    sample_values:
    - Research & Development
    - Operational OIE
  - name: FUNC_AREA_LEVEL_3
    description: 'Third level: specific functions. Values: Admin, Marketing & Sales, Cost of Sales. Most granular named level before functional area codes. The third hierarchical level of the functional area classification.'
    expr: FUNC_AREA_LEVEL_3
    data_type: VARCHAR(16777216)
    sample_values:
    - Cost of Sales
    - Sales & Marketing
    - Internal Reporting Excluding OIE
  - name: FUNC_AREA_LEVEL_4
    description: 'Forth level: specific functions. Values: Admin, Marketing & Sales, Cost of Sales. Most granular named level before functional area codes. The name or identifier of a functional area at the fourth level of the functional area hierarchy.'
    expr: FUNC_AREA_LEVEL_4
    data_type: VARCHAR(16777216)
    sample_values:
