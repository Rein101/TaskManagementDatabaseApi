- name: Diagnose spending breakdown by account hierarchy
  sql: |-
    SELECT
      a.ACCOUNT_LEVEL_1,
      a.ACCOUNT_LEVEL_2,
      a.ACCOUNT_LEVEL_3,
      a.ACCOUNT_LEVEL_4,
      a.ACCOUNT_CODE_AND_DESC AS ACCOUNT,
      SUM(CASE WHEN f.VERSION = 'Actual' THEN f.VAL_EUR_NORM ELSE 0 END) AS ACTUAL,
      SUM(CASE WHEN f.VERSION = 'Budget X' THEN f.VAL_EUR_NORM ELSE 0 END) AS BUDGET,
      SUM(CASE WHEN f.VERSION = 'Actual' THEN f.VAL_EUR_NORM ELSE 0 END)
        - SUM(CASE WHEN f.VERSION = 'Budget X' THEN f.VAL_EUR_NORM ELSE 0 END) AS VARIANCE,
      ROUND(
        (SUM(CASE WHEN f.VERSION = 'Actual' THEN f.VAL_EUR_NORM ELSE 0 END)
         - SUM(CASE WHEN f.VERSION = 'Budget X' THEN f.VAL_EUR_NORM ELSE 0 END))
        / NULLIF(SUM(CASE WHEN f.VERSION = 'Budget X' THEN f.VAL_EUR_NORM ELSE 0 END), 0) * 100
      , 1) AS VARIANCE_PCT
    FROM ACC_PRD.COST_CENTER.VW_JEDOX_DATA_OPEX f
    JOIN ACC_PRD.MASTERDATA.VW_JEDOX_MASTER_DATA_ACCOUNT a
      ON f.ACCOUNT = a.ACCOUNT_CODE
    WHERE f.VERSION IN ('Actual', 'Budget X')
      AND a.ACCOUNT_LEVEL_1 = 'OPEX'
    GROUP BY a.ACCOUNT_LEVEL_1, a.ACCOUNT_LEVEL_2, a.ACCOUNT_LEVEL_3, a.ACCOUNT_LEVEL_4, a.ACCOUNT_CODE_AND_DESC
    HAVING ACTUAL != 0 OR BUDGET != 0
    ORDER BY VARIANCE DESC
  question: Diagnose spending breakdown by account hierarchy
  verified_at: 1781186498
  verified_by: Matilda Migwi
  use_as_onboarding_question: false
- name: Diagnose spending breakdown by cost center hierarchy
  sql: |-
    SELECT
      c.COST_CENTER_LEVEL_1,
      c.COST_CENTER_LEVEL_2,
      c.COST_CENTER_LEVEL_3,
      c.COST_CENTER_LEVEL_4,
      c.COST_CENTER_CODE_AND_DESC AS COST_CENTER,
      SUM(
        CASE
          WHEN f.VERSION = 'Actual' THEN f.VAL_EUR_NORM
          ELSE 0
        END
      ) AS ACTUAL,
      SUM(
        CASE
          WHEN f.VERSION = 'Budget X' THEN f.VAL_EUR_NORM
          ELSE 0
        END
      ) AS BUDGET,
      SUM(
        CASE
          WHEN f.VERSION = 'Actual' THEN f.VAL_EUR_NORM
          ELSE 0
        END
      ) - SUM(
        CASE
          WHEN f.VERSION = 'Budget X' THEN f.VAL_EUR_NORM
          ELSE 0
        END
      ) AS VARIANCE,
      ROUND(
        (
          SUM(
            CASE
              WHEN f.VERSION = 'Actual' THEN f.VAL_EUR_NORM
              ELSE 0
            END
          ) - SUM(
            CASE
              WHEN f.VERSION = 'Budget X' THEN f.VAL_EUR_NORM
              ELSE 0
            END
          )
        ) / NULLIF(
          SUM(
            CASE
              WHEN f.VERSION = 'Budget X' THEN f.VAL_EUR_NORM
              ELSE 0
            END
          ),
          0
        ) * 100,
        1
      ) AS VARIANCE_PCT
    FROM
      ACC_PRD.COST_CENTER.VW_JEDOX_DATA_OPEX f
      JOIN ACC_PRD.MASTERDATA.VW_JEDOX_MASTER_DATA_COST_CENTER c ON f.COST_CENTER = c.COST_CENTER_CODE
    WHERE
      f.VERSION IN ('Actual', 'Budget X')
      AND c.COST_CENTER_LEVEL_1 = 'All Cost Centers'
    GROUP BY
      c.COST_CENTER_LEVEL_1,
      c.COST_CENTER_LEVEL_2,
      c.COST_CENTER_LEVEL_3,
      c.COST_CENTER_LEVEL_4,
      c.COST_CENTER_CODE_AND_DESC
    HAVING
      ACTUAL != 0
      OR BUDGET != 0
    ORDER BY
      VARIANCE DESC
  question: Diagnose spending breakdown by cost center hierarchy
  verified_at: 1781189294
  verified_by: Matilda Migwi
  use_as_onboarding_question: false
- name: Diagnose spending breakdown by account hierarchy for current FY
  sql: |-
    SELECT
      a.ACCOUNT_LEVEL_2, a.ACCOUNT_LEVEL_3, a.ACCOUNT_LEVEL_4, a.ACCOUNT_CODE_AND_DESC AS ACCOUNT,
      SUM(CASE WHEN f.VERSION = 'Actual'   THEN f.VAL_EUR_NORM ELSE 0 END) AS ACTUAL,
      SUM(CASE WHEN f.VERSION = 'Budget X' THEN f.VAL_EUR_NORM ELSE 0 END) AS BUDGET,
      SUM(CASE WHEN f.VERSION = 'Actual'   THEN f.VAL_EUR_NORM ELSE 0 END)
        - SUM(CASE WHEN f.VERSION = 'Budget X' THEN f.VAL_EUR_NORM ELSE 0 END) AS VARIANCE,
      ROUND((SUM(CASE WHEN f.VERSION='Actual' THEN f.VAL_EUR_NORM ELSE 0 END)
        - SUM(CASE WHEN f.VERSION='Budget X' THEN f.VAL_EUR_NORM ELSE 0 END))
        / NULLIF(SUM(CASE WHEN f.VERSION='Budget X' THEN f.VAL_EUR_NORM ELSE 0 END), 0) * 100, 1) AS VARIANCE_PCT
    FROM ACC_PRD.COST_CENTER.VW_JEDOX_DATA_OPEX f
    JOIN ACC_PRD.MASTERDATA.VW_JEDOX_MASTER_DATA_ACCOUNT a ON f.ACCOUNT = a.ACCOUNT_CODE
    WHERE f.VERSION IN ('Actual', 'Budget X')
      AND a.ACCOUNT_LEVEL_1 = 'OPEX'
      AND f.TIME BETWEEN (CASE WHEN MONTH(CURRENT_DATE()) >= 10 THEN YEAR(CURRENT_DATE()) ELSE YEAR(CURRENT_DATE()) - 1 END || '-10') AND (CASE WHEN MONTH(CURRENT_DATE()) >= 10 THEN YEAR(CURRENT_DATE()) + 1 ELSE YEAR(CURRENT_DATE()) END || '-09')
    GROUP BY 1, 2, 3, 4
    HAVING ACTUAL != 0 OR BUDGET != 0
    ORDER BY VARIANCE DESC
