- name: Show month over month OPEX change by account. What changed between the last two months?
  sql: |-
    WITH fy_bounds AS (
      SELECT
        CASE
          WHEN MONTH(CURRENT_DATE()) >= 10 THEN YEAR(CURRENT_DATE())
          ELSE YEAR(CURRENT_DATE()) - 1
        END AS fy_start_year
    ),
    latest_periods AS (
      SELECT
        DISTINCT TIME
      FROM
        ACC_PRD.COST_CENTER.VW_JEDOX_DATA_OPEX,
        fy_bounds b
      WHERE
        VERSION = 'Actual'
        AND TIME >= b.fy_start_year || '-10'
      ORDER BY
        TIME DESC
      LIMIT
        2
    ), period_labels AS (
      SELECT
        MAX(TIME) AS current_month,
        MIN(TIME) AS prior_month
      FROM
        latest_periods
    )
    SELECT
      acct.ACCOUNT_LEVEL_2,
      acct.ACCOUNT_LEVEL_3,
      acct.ACCOUNT_LEVEL_4,
      acct.ACCOUNT_CODE_AND_DESC,
      SUM(
        CASE
          WHEN f.TIME = p.current_month THEN f.VAL_EUR_NORM
          ELSE 0
        END
      ) AS CURRENT_MONTH,
      SUM(
        CASE
          WHEN f.TIME = p.prior_month THEN f.VAL_EUR_NORM
          ELSE 0
        END
      ) AS PRIOR_MONTH,
      SUM(
        CASE
          WHEN f.TIME = p.current_month THEN f.VAL_EUR_NORM
          ELSE 0
        END
      ) - SUM(
        CASE
          WHEN f.TIME = p.prior_month THEN f.VAL_EUR_NORM
          ELSE 0
        END
      ) AS MOM_CHANGE
    FROM
      ACC_PRD.COST_CENTER.VW_JEDOX_DATA_OPEX f
      CROSS JOIN period_labels p
      JOIN ACC_PRD.MASTERDATA.VW_JEDOX_MASTER_DATA_ACCOUNT acct ON f.ACCOUNT = acct.ACCOUNT_CODE
    WHERE
      f.VERSION = 'Actual'
      AND f.TIME IN (p.current_month, p.prior_month)
      AND acct.ACCOUNT_LEVEL_1 = 'OPEX'
    GROUP BY
      1,
      2,
      3,
      4
    HAVING
      ABS(MOM_CHANGE) > 0
    ORDER BY
      MOM_CHANGE DESC
