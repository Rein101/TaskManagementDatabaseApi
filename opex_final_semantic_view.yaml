    JOIN ACC_PRD.MASTERDATA.VW_JEDOX_MASTER_DATA_ACCOUNT a ON f.ACCOUNT = a.ACCOUNT_CODE
    JOIN ACC_PRD.MASTERDATA.VW_JEDOX_MASTER_DATA_PROFIT_CENTER p ON f.PROFIT_CENTER = p.PROFIT_CENTER_CODE
    WHERE f.VERSION IN ('Actual', 'Budget X')
      AND a.ACCOUNT_LEVEL_1 = 'OPEX'
      AND p.PROFIT_CENTER_LEVEL_1 = 'All Profit Center'
      AND f.TIME BETWEEN (SELECT fy_start FROM fy_bounds) AND ytd_end.ytd
    GROUP BY 1, 2, 3
    HAVING ABS(VARIANCE_EUR) > 0
