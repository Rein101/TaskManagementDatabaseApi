- name: Which cost centers are over forecast by more than 10 percent this fiscal year?
  question: Which cost centers are over forecast by more than 10 percent this fiscal year?
  sql: |-
    WITH latest_fcst AS (
      SELECT MAX(VERSION) AS fcst_version FROM ACC_PRD.COST_CENTER.VW_JEDOX_DATA_OPEX WHERE VERSION ILIKE 'FY% FCST P%'
    )
    SELECT
      c.COST_CENTER_LEVEL_3, c.COST_CENTER_LEVEL_4, c.COST_CENTER_CODE_AND_DESC AS COST_CENTER,
      ROUND(SUM(CASE WHEN f.VERSION='Actual'        THEN f.VAL_EUR_NORM ELSE 0 END), 2) AS ACTUAL_EUR,
      ROUND(SUM(CASE WHEN f.VERSION=lf.fcst_version THEN f.VAL_EUR_NORM ELSE 0 END), 2) AS FORECAST_EUR,
      ROUND((SUM(CASE WHEN f.VERSION='Actual' THEN f.VAL_EUR_NORM ELSE 0 END)
        - SUM(CASE WHEN f.VERSION=lf.fcst_version THEN f.VAL_EUR_NORM ELSE 0 END))
        / NULLIF(SUM(CASE WHEN f.VERSION=lf.fcst_version THEN f.VAL_EUR_NORM ELSE 0 END), 0) * 100, 1) AS OVER_FCST_PCT
    FROM ACC_PRD.COST_CENTER.VW_JEDOX_DATA_OPEX f
    CROSS JOIN latest_fcst lf
    JOIN ACC_PRD.MASTERDATA.VW_JEDOX_MASTER_DATA_ACCOUNT a ON f.ACCOUNT = a.ACCOUNT_CODE
    JOIN ACC_PRD.MASTERDATA.VW_JEDOX_MASTER_DATA_COST_CENTER c ON f.COST_CENTER = c.COST_CENTER_CODE
    WHERE f.VERSION IN ('Actual', (SELECT fcst_version FROM latest_fcst))
      AND a.ACCOUNT_LEVEL_1 = 'OPEX'
      AND c.COST_CENTER_LEVEL_1 = 'All Cost Centers'
      AND f.TIME BETWEEN (CASE WHEN MONTH(CURRENT_DATE())>=10 THEN  YEAR(CURRENT_DATE())    ELSE YEAR(CURRENT_DATE())-1 END ||'-10') AND (CASE WHEN MONTH(CURRENT_DATE())>=10 THEN (YEAR(CURRENT_DATE())+1) ELSE YEAR(CURRENT_DATE())   END ||'-09')
    GROUP BY 1, 2, 3
    HAVING OVER_FCST_PCT > 10
    ORDER BY OVER_FCST_PCT DESC
