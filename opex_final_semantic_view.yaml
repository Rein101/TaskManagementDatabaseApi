- name: Compare the cost for March this fiscal year vs March last fiscal year by account hierarchy
  sql: |-
    WITH fy_bounds AS (
      SELECT
        CASE
          WHEN MONTH(CURRENT_DATE()) >= 10 THEN YEAR(CURRENT_DATE())
          ELSE YEAR(CURRENT_DATE()) - 1
        END AS fy_start_year
    ),
    target_periods AS (
      SELECT
        (b.fy_start_year + 1) || '-03' AS current_period,
        b.fy_start_year || '-03' AS prior_period
      FROM
        fy_bounds b
    )
    SELECT
      acct.ACCOUNT_LEVEL_2,
      acct.ACCOUNT_LEVEL_3,
      acct.ACCOUNT_LEVEL_4,
      acct.ACCOUNT_CODE_AND_DESC,
      SUM(
        CASE
          WHEN f.TIME = t.current_period THEN f.VAL_EUR_NORM
          ELSE 0
        END
      ) AS THIS_YEAR_MARCH,
      SUM(
        CASE
          WHEN f.TIME = t.prior_period THEN f.VAL_EUR_NORM
          ELSE 0
        END
      ) AS LAST_YEAR_MARCH,
      SUM(
        CASE
          WHEN f.TIME = t.current_period THEN f.VAL_EUR_NORM
          ELSE 0
        END
      ) - SUM(
        CASE
          WHEN f.TIME = t.prior_period THEN f.VAL_EUR_NORM
          ELSE 0
        END
      ) AS YOY_CHANGE
    FROM
      ACC_PRD.COST_CENTER.VW_JEDOX_DATA_OPEX f
      CROSS JOIN target_periods t
      JOIN ACC_PRD.MASTERDATA.VW_JEDOX_MASTER_DATA_ACCOUNT acct ON f.ACCOUNT = acct.ACCOUNT_CODE
    WHERE
      f.VERSION = 'Actual'
      AND f.TIME IN (t.current_period, t.prior_period)
      AND acct.ACCOUNT_LEVEL_1 = 'OPEX'
    GROUP BY
      1,
      2,
      3,
      4
    HAVING
      ABS(YOY_CHANGE) > 0
    ORDER BY
      YOY_CHANGE DESC
