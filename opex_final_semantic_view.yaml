- name: What are the key drivers of the variance between Actual and Forecast (ACT vs FCST) by account?
  question: What are the key drivers of the variance between Actual and Forecast (ACT vs FCST) by account?
  sql: |-
    WITH latest_fcst AS (
      SELECT MAX(VERSION) AS fcst_version FROM ACC_PRD.COST_CENTER.VW_JEDOX_DATA_OPEX WHERE VERSION ILIKE 'FY% FCST P%'
    )
    SELECT
      a.ACCOUNT_LEVEL_2, a.ACCOUNT_LEVEL_3, a.ACCOUNT_LEVEL_4, a.ACCOUNT_CODE_AND_DESC AS ACCOUNT,
      SUM(CASE WHEN f.VERSION = 'Actual' THEN f.VAL_EUR_NORM ELSE 0 END) AS ACTUAL,
      SUM(CASE WHEN f.VERSION = lf.fcst_version THEN f.VAL_EUR_NORM ELSE 0 END) AS FORECAST,
      SUM(CASE WHEN f.VERSION = 'Actual' THEN f.VAL_EUR_NORM ELSE 0 END)
        - SUM(CASE WHEN f.VERSION = lf.fcst_version THEN f.VAL_EUR_NORM ELSE 0 END) AS VARIANCE,
      ROUND((SUM(CASE WHEN f.VERSION='Actual' THEN f.VAL_EUR_NORM ELSE 0 END)
        - SUM(CASE WHEN f.VERSION=lf.fcst_version THEN f.VAL_EUR_NORM ELSE 0 END))
        / NULLIF(SUM(CASE WHEN f.VERSION=lf.fcst_version THEN f.VAL_EUR_NORM ELSE 0 END), 0) * 100, 1) AS VARIANCE_PCT
    FROM ACC_PRD.COST_CENTER.VW_JEDOX_DATA_OPEX f
    CROSS JOIN latest_fcst lf
    JOIN ACC_PRD.MASTERDATA.VW_JEDOX_MASTER_DATA_ACCOUNT a ON f.ACCOUNT = a.ACCOUNT_CODE
    WHERE f.VERSION IN ('Actual', (SELECT fcst_version FROM latest_fcst))
      AND a.ACCOUNT_LEVEL_1 = 'OPEX'
      AND f.TIME BETWEEN (CASE WHEN MONTH(CURRENT_DATE()) >= 10 THEN YEAR(CURRENT_DATE()) ELSE YEAR(CURRENT_DATE()) - 1 END || '-10') AND (CASE WHEN MONTH(CURRENT_DATE()) >= 10 THEN YEAR(CURRENT_DATE()) + 1 ELSE YEAR(CURRENT_DATE()) END || '-09')
    GROUP BY 1, 2, 3, 4
    HAVING ABS(VARIANCE) > 0
    ORDER BY VARIANCE DESC
