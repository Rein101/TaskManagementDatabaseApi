- name: Why did account costs increase? Drill down by account hierarchy.
  sql: |-
    SELECT
      a.ACCOUNT_LEVEL_1,
      a.ACCOUNT_LEVEL_2,
      a.ACCOUNT_LEVEL_3,
      a.ACCOUNT_LEVEL_4,
      a.ACCOUNT_CODE_AND_DESC,
      SUM(f.VAL_EUR_NORM) AS TOTAL_COST
    FROM
      ACC_PRD.COST_CENTER.VW_JEDOX_DATA_OPEX f
      JOIN ACC_PRD.MASTERDATA.VW_JEDOX_MASTER_DATA_ACCOUNT a ON f.ACCOUNT = a.ACCOUNT_CODE
    WHERE
      f.VERSION = 'Actual'
      AND a.ACCOUNT_LEVEL_1 = 'OPEX'
    GROUP BY
      a.ACCOUNT_LEVEL_1,
      a.ACCOUNT_LEVEL_2,
      a.ACCOUNT_LEVEL_3,
      a.ACCOUNT_LEVEL_4,
      a.ACCOUNT_CODE_AND_DESC
    ORDER BY
      TOTAL_COST DESC
