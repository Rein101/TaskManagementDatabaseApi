- name: What percentage of total OPEX is employee compensation by cost center this fiscal year?
  question: What percentage of total OPEX is employee compensation by cost center this fiscal year?
  sql: |-
    WITH
      comp AS (
        SELECT f.COST_CENTER, SUM(f.VAL_EUR_NORM) AS comp_eur
        FROM ACC_PRD.COST_CENTER.VW_JEDOX_DATA_OPEX f
        JOIN ACC_PRD.MASTERDATA.VW_JEDOX_MASTER_DATA_ACCOUNT a ON f.ACCOUNT = a.ACCOUNT_CODE
        WHERE f.VERSION = 'Actual'
          AND a.ACCOUNT_LEVEL_1 = 'OPEX'
          AND a.ACCOUNT_LEVEL_3 = 'Compensation'
          AND f.TIME BETWEEN (CASE WHEN MONTH(CURRENT_DATE())>=10 THEN  YEAR(CURRENT_DATE())    ELSE YEAR(CURRENT_DATE())-1 END ||'-10') AND (CASE WHEN MONTH(CURRENT_DATE())>=10 THEN (YEAR(CURRENT_DATE())+1) ELSE YEAR(CURRENT_DATE())   END ||'-09')
        GROUP BY f.COST_CENTER
      ),
      total AS (
        SELECT f.COST_CENTER, SUM(f.VAL_EUR_NORM) AS total_eur
        FROM ACC_PRD.COST_CENTER.VW_JEDOX_DATA_OPEX f
        JOIN ACC_PRD.MASTERDATA.VW_JEDOX_MASTER_DATA_ACCOUNT a ON f.ACCOUNT = a.ACCOUNT_CODE
        WHERE f.VERSION = 'Actual'
          AND a.ACCOUNT_LEVEL_1 = 'OPEX'
          AND f.TIME BETWEEN (CASE WHEN MONTH(CURRENT_DATE())>=10 THEN  YEAR(CURRENT_DATE())    ELSE YEAR(CURRENT_DATE())-1 END ||'-10') AND (CASE WHEN MONTH(CURRENT_DATE())>=10 THEN (YEAR(CURRENT_DATE())+1) ELSE YEAR(CURRENT_DATE())   END ||'-09')
        GROUP BY f.COST_CENTER
      )
    SELECT
      c.COST_CENTER_CODE_AND_DESC AS COST_CENTER,
      ROUND(comp.comp_eur, 2)   AS COMPENSATION_EUR,
      ROUND(total.total_eur, 2) AS TOTAL_OPEX_EUR,
      ROUND(comp.comp_eur / NULLIF(total.total_eur, 0) * 100, 1) AS COMP_PCT_OF_OPEX
    FROM comp
    JOIN total ON comp.COST_CENTER = total.COST_CENTER
    JOIN ACC_PRD.MASTERDATA.VW_JEDOX_MASTER_DATA_COST_CENTER c ON comp.COST_CENTER = c.COST_CENTER_CODE
    ORDER BY COMP_PCT_OF_OPEX DESC
