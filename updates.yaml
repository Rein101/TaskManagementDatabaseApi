- name: Compare this fiscal year vs last fiscal year by cost center.  Year-over-year cost center comparison. Where did spending change the most?
  sql: |-
    WITH
      fy_bounds AS (
        SELECT
          CASE WHEN MONTH(CURRENT_DATE()) >= 10 THEN YEAR(CURRENT_DATE())     ELSE YEAR(CURRENT_DATE()) - 1 END || '-10' AS fy_start,
          CASE WHEN MONTH(CURRENT_DATE()) >= 10 THEN YEAR(CURRENT_DATE()) + 1 ELSE YEAR(CURRENT_DATE())     END || '-09' AS fy_end,
          CASE WHEN MONTH(CURRENT_DATE()) >= 10 THEN YEAR(CURRENT_DATE()) - 1 ELSE YEAR(CURRENT_DATE()) - 2 END || '-10' AS pfy_start,
          CASE WHEN MONTH(CURRENT_DATE()) >= 10 THEN YEAR(CURRENT_DATE())     ELSE YEAR(CURRENT_DATE()) - 1 END || '-09' AS pfy_end
      ),
      current_fy_periods AS (
        SELECT DISTINCT f.TIME FROM ACC_PRD.COST_CENTER.VW_JEDOX_DATA_OPEX f, fy_bounds b
        WHERE f.VERSION = 'Actual' AND f.TIME BETWEEN b.fy_start AND b.fy_end
      ),
      prior_fy_periods AS (
        SELECT DISTINCT f.TIME FROM ACC_PRD.COST_CENTER.VW_JEDOX_DATA_OPEX f, fy_bounds b
        WHERE f.VERSION = 'Actual' AND f.TIME BETWEEN b.pfy_start AND b.pfy_end
          AND SUBSTR(f.TIME, 6, 2) IN (SELECT SUBSTR(TIME, 6, 2) FROM current_fy_periods)
      )
    SELECT
      cc.COST_CENTER_LEVEL_2, cc.COST_CENTER_LEVEL_3, cc.COST_CENTER_LEVEL_4, cc.COST_CENTER_CODE_AND_DESC,
      SUM(CASE WHEN f.TIME IN (SELECT TIME FROM current_fy_periods) THEN f.VAL_EUR_NORM ELSE 0 END) AS CURRENT_FY_ACTUAL,
      SUM(CASE WHEN f.TIME IN (SELECT TIME FROM prior_fy_periods)   THEN f.VAL_EUR_NORM ELSE 0 END) AS PRIOR_FY_ACTUAL,
      SUM(CASE WHEN f.TIME IN (SELECT TIME FROM current_fy_periods) THEN f.VAL_EUR_NORM ELSE 0 END)
        - SUM(CASE WHEN f.TIME IN (SELECT TIME FROM prior_fy_periods) THEN f.VAL_EUR_NORM ELSE 0 END) AS YOY_CHANGE
    FROM ACC_PRD.COST_CENTER.VW_JEDOX_DATA_OPEX f
    JOIN ACC_PRD.MASTERDATA.VW_JEDOX_MASTER_DATA_COST_CENTER cc ON f.COST_CENTER = cc.COST_CENTER_CODE
    WHERE f.VERSION = 'Actual'
      AND (f.TIME IN (SELECT TIME FROM current_fy_periods) OR f.TIME IN (SELECT TIME FROM prior_fy_periods))
      AND cc.COST_CENTER_LEVEL_1 = 'All Cost Centers'
    GROUP BY 1, 2, 3, 4
    HAVING ABS(YOY_CHANGE) > 0
    ORDER BY YOY_CHANGE DESC
    LIMIT 20
