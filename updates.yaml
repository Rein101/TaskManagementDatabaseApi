- name: Which accounts show cost reductions year over year? Identify efficiency gains and savings.
  sql: |-
    WITH
      fy_bounds AS (
        SELECT
          CASE WHEN MONTH(CURRENT_DATE()) >= 10 THEN YEAR(CURRENT_DATE())     ELSE YEAR(CURRENT_DATE()) - 1 END || '-10' AS fy_start,
          CASE WHEN MONTH(CURRENT_DATE()) >= 10 THEN YEAR(CURRENT_DATE()) + 1 ELSE YEAR(CURRENT_DATE())     END || '-09' AS fy_end,
          CASE WHEN MONTH(CURRENT_DATE()) >= 10 THEN YEAR(CURRENT_DATE()) - 1 ELSE YEAR(CURRENT_DATE()) - 2 END || '-10' AS pfy_start,
          CASE WHEN MONTH(CURRENT_DATE()) >= 10 THEN YEAR(CURRENT_DATE())     ELSE YEAR(CURRENT_DATE()) - 1 END || '-09' AS pfy_end
      )
    SELECT
      a.ACCOUNT_LEVEL_2 AS ACCOUNT_CATEGORY, a.ACCOUNT_LEVEL_3 AS ACCOUNT_SUBCATEGORY,
      a.ACCOUNT_LEVEL_4 AS ACCOUNT_DETAIL, a.ACCOUNT_CODE_AND_DESC AS ACCOUNT,
      ROUND(SUM(CASE WHEN f.TIME BETWEEN (SELECT fy_start FROM fy_bounds)  AND (SELECT fy_end FROM fy_bounds)  THEN f.VAL_EUR_NORM ELSE 0 END), 2) AS CURRENT_FY_ACTUAL,
      ROUND(SUM(CASE WHEN f.TIME BETWEEN (SELECT pfy_start FROM fy_bounds) AND (SELECT pfy_end FROM fy_bounds) THEN f.VAL_EUR_NORM ELSE 0 END), 2) AS PRIOR_FY_ACTUAL,
      ROUND(SUM(CASE WHEN f.TIME BETWEEN (SELECT fy_start FROM fy_bounds)  AND (SELECT fy_end FROM fy_bounds)  THEN f.VAL_EUR_NORM ELSE 0 END)
        - SUM(CASE WHEN f.TIME BETWEEN (SELECT pfy_start FROM fy_bounds) AND (SELECT pfy_end FROM fy_bounds) THEN f.VAL_EUR_NORM ELSE 0 END), 2) AS YOY_SAVINGS
    FROM ACC_PRD.COST_CENTER.VW_JEDOX_DATA_OPEX f
    JOIN ACC_PRD.MASTERDATA.VW_JEDOX_MASTER_DATA_ACCOUNT a ON f.ACCOUNT = a.ACCOUNT_CODE
    WHERE f.VERSION = 'Actual'
      AND a.ACCOUNT_LEVEL_1 = 'OPEX'
    GROUP BY 1, 2, 3, 4
    HAVING PRIOR_FY_ACTUAL > 0 AND CURRENT_FY_ACTUAL < PRIOR_FY_ACTUAL
    ORDER BY YOY_SAVINGS ASC
