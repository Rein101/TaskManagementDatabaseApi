- name: What is the OpEx cost per FTE by cost center this fiscal year?
  question: What is the OpEx cost per FTE by cost center this fiscal year?
  sql: |-
    WITH cost AS (
      SELECT f.COST_CENTER, SUM(f.VAL_EUR_NORM) AS opex_cost
      FROM ACC_PRD.COST_CENTER.VW_JEDOX_DATA_OPEX f
      JOIN ACC_PRD.MASTERDATA.VW_JEDOX_MASTER_DATA_ACCOUNT a ON f.ACCOUNT = a.ACCOUNT_CODE
      WHERE f.VERSION = 'Actual' AND a.ACCOUNT_LEVEL_1 = 'OPEX' AND f.TIME BETWEEN (CASE WHEN MONTH(CURRENT_DATE()) >= 10 THEN YEAR(CURRENT_DATE()) ELSE YEAR(CURRENT_DATE()) - 1 END || '-10') AND (CASE WHEN MONTH(CURRENT_DATE()) >= 10 THEN YEAR(CURRENT_DATE()) + 1 ELSE YEAR(CURRENT_DATE()) END || '-09')
      GROUP BY f.COST_CENTER
    ),
    fte AS (
      SELECT f.COST_CENTER, AVG(monthly_fte) AS fte_count FROM (
        SELECT f.COST_CENTER, f.TIME, SUM(f.VAL_EUR_NORM) AS monthly_fte
        FROM ACC_PRD.COST_CENTER.VW_JEDOX_DATA_OPEX f
        JOIN ACC_PRD.MASTERDATA.VW_JEDOX_MASTER_DATA_ACCOUNT a ON f.ACCOUNT = a.ACCOUNT_CODE
        WHERE f.VERSION = 'Actual'
          AND a.ACCOUNT_LEVEL_1 = 'Statistical Accounts'
          AND a.ACCOUNT_LEVEL_3 ILIKE '%FTE%'
          AND f.TIME BETWEEN (CASE WHEN MONTH(CURRENT_DATE()) >= 10 THEN YEAR(CURRENT_DATE()) ELSE YEAR(CURRENT_DATE()) - 1 END || '-10') AND (CASE WHEN MONTH(CURRENT_DATE()) >= 10 THEN YEAR(CURRENT_DATE()) + 1 ELSE YEAR(CURRENT_DATE()) END || '-09')
        GROUP BY f.COST_CENTER, f.TIME
      ) f
      GROUP BY f.COST_CENTER
    )
    SELECT
      c.COST_CENTER_CODE_AND_DESC AS COST_CENTER,
      ROUND(cost.opex_cost, 2) AS OPEX_COST,
      ROUND(fte.fte_count, 2) AS AVG_FTE,
      ROUND(cost.opex_cost / NULLIF(fte.fte_count, 0), 2) AS COST_PER_FTE
    FROM cost
    JOIN fte ON cost.COST_CENTER = fte.COST_CENTER
    JOIN ACC_PRD.MASTERDATA.VW_JEDOX_MASTER_DATA_COST_CENTER c ON cost.COST_CENTER = c.COST_CENTER_CODE
    ORDER BY COST_PER_FTE DESC
