          WHEN f.TIME = t.current_period THEN f.VAL_EUR_NORM
          ELSE 0
        END
      ) AS THIS_YEAR_MARCH,
      SUM(
        CASE
          WHEN f.TIME = t.prior_period THEN f.VAL_EUR_NORM
          ELSE 0
        END
      ) AS LAST_YEAR_MARCH,
      SUM(
        CASE
          WHEN f.TIME = t.current_period THEN f.VAL_EUR_NORM
          ELSE 0
        END
      ) - SUM(
        CASE
          WHEN f.TIME = t.prior_period THEN f.VAL_EUR_NORM
          ELSE 0
        END
      ) AS YOY_CHANGE
