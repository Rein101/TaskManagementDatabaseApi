- name: Forecast next year's monthly tech-cost spend for the Global SVC teams using the seasonality of the last 3 years.
  question: Forecast next year's monthly tech-cost spend for the Global SVC teams using the seasonality of the last 3 years.
  sql: |-
    WITH hist AS (
      SELECT RIGHT(f.TIME, 2) AS MONTH_NUM, f.TIME, SUM(f.VAL_EUR_NORM) AS spend
      FROM ACC_PRD.COST_CENTER.VW_JEDOX_DATA_OPEX f
      JOIN ACC_PRD.MASTERDATA.VW_JEDOX_MASTER_DATA_ACCOUNT a ON f.ACCOUNT = a.ACCOUNT_CODE
      JOIN ACC_PRD.MASTERDATA.VW_JEDOX_MASTER_DATA_COST_CENTER c ON f.COST_CENTER = c.COST_CENTER_CODE
      WHERE f.VERSION = 'Actual'
        AND a.ACCOUNT_LEVEL_3 = 'Tech Cost'
        AND c.COST_CENTER_LEVEL_4 = 'Global SVC'
        AND f.TIME >= TO_CHAR(DATEADD(month, -36, CURRENT_DATE()), 'YYYY-MM')
      GROUP BY 1, 2
    )
    SELECT
      MONTH_NUM,
      ROUND(AVG(spend), 2) AS SEASONAL_MONTHLY_FORECAST,
      COUNT(*) AS YEARS_OBSERVED
    FROM hist
    GROUP BY MONTH_NUM
    ORDER BY MONTH_NUM
