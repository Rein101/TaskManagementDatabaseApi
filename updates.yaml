  verified_by: hardening_pass
  use_as_onboarding_question: false
module_custom_instructions:
  sql_generation: |-
    DEFAULT FILTERS (apply unless the user explicitly overrides):
    1. Value column: VAL_EUR_NORM. Use VAL_USD_INI only if the user asks for USD/dollars, VAL_EUR for non-normalized EUR, VAL_LC for local currency.
    2. VERSION = 'Actual' unless the user asks for budget or forecast.
    3. ACCOUNT_LEVEL_1 = 'OPEX' unless the user asks for other account categories.
    4. COST_CENTER_LEVEL_1 = 'All Cost Centers' unless the user asks for GEO Service.
    5. ENTITY_LEVEL_1 = 'Worldwide' unless the user asks for other entities.
    6. PROFIT_CENTER_LEVEL_1 = 'All Profit Center' unless the user names another scope.
    7. FUNC_AREA_LEVEL_1 = 'Internal Reporting' unless the user asks for Internal Reporting Excluding OIE.

    CURRENT FISCAL YEAR (NEVER hardcode the year): the fiscal year starts in October. Compute the current-FY window dynamically:
      start = (CASE WHEN MONTH(CURRENT_DATE()) >= 10 THEN YEAR(CURRENT_DATE()) ELSE YEAR(CURRENT_DATE()) - 1 END || '-10')
      end   = (CASE WHEN MONTH(CURRENT_DATE()) >= 10 THEN YEAR(CURRENT_DATE()) + 1 ELSE YEAR(CURRENT_DATE()) END || '-09')
    Default to the current fiscal year when no period is given. Q1 = Oct-Dec, Q2 = Jan-Mar, Q3 = Apr-Jun, Q4 = Jul-Sep. For fiscal quarter / period logic, join to VW_FISCAL_DATE on f.TIME = CAL_YEAR_MONTH_NUM.

    ACT vs FCST (the core U+4 use case): 'forecast' means a VERSION matching 'FY% FCST P%'. When the user does not name a version, select the latest forecast version with:
      WITH latest_fcst AS (SELECT MAX(VERSION) AS fcst_version FROM ACC_PRD.COST_CENTER.VW_JEDOX_DATA_OPEX WHERE VERSION ILIKE 'FY% FCST P%')
    Compare it against VERSION = 'Actual'. NEVER sum across multiple forecast versions at once. ACT vs Budget uses VERSION = 'Budget X'.

    HEADCOUNT / FTE: FTE and headcount are STATISTICAL quantities, not money. They live under ACCOUNT_LEVEL_1 = 'Statistical Accounts' (FTE under ACCOUNT_LEVEL_3 like '%FTE%'). NEVER add FTE counts to OpEx EUR or sum them together. To compute cost-per-FTE, pull OpEx cost (ACCOUNT_LEVEL_1='OPEX') and FTE count (ACCOUNT_LEVEL_1='Statistical Accounts') in separate CTEs and divide. FTE is a point-in-time stock, so average it across months rather than summing.

    NUMBER FORMATTING: 2 decimals with thousands separators via TO_CHAR(value, '999,999,999,990.00'); for large numbers also offer /1000 (K) and /1000000 (M) columns.

    LOCAL CURRENCY: when using VAL_LC, ALWAYS GROUP BY CURRENCY and show CURRENCY as a column. Never sum VAL_LC across currencies.

    DIAGNOSTICS: when the user asks 'why', 'reason', 'explain', 'diagnose', or 'driver', return all relevant hierarchy levels in the SELECT so the answer is a drilldown.
  question_categorization: |-
    The fiscal year starts in OCTOBER and ends in SEPTEMBER. When no period is given, default to the current fiscal year computed from CURRENT_DATE() (never a hardcoded year). 'This quarter' = the fiscal quarter the current month falls in; 'YTD' = current-FY October through the latest available month.

    SCOPE GUARDRAIL - this model covers OpEx cost and statistical/headcount data by ACCOUNT, COST CENTER, PROFIT CENTER, ENTITY, FUNCTIONAL AREA, PROJECT and PERIOD. It does NOT contain: vendor/supplier-level detail, customer or accounts-receivable / bad-debt data, revenue, or install-base data. If a question requires any of those, tell the user the data is not in this model and offer the closest available alternative (e.g. cost-type breakdown by account instead of vendor; net FTE change instead of gross hires/terminations) rather than guessing.

    SIMULATIONS: questions like 'how much do we save if we postpone hiring' or 'if we move Team A from location X to Y' depend on user assumptions (months delayed, destination cost-per-FTE). Return the building-block figures (e.g. monthly run-rate, cost-per-FTE by location) and state the assumption used.
description: 'Operating-expense (OpEx) cost-center analytics for ACT vs FCST / ACT vs Budget commentary on the U+4 report. Grain: one row per account x cost center x profit center x entity x functional area x period (TIME, YYYY-MM) x VERSION. Default value column is VAL_EUR_NORM. Fiscal year starts in October (FY2026 = 2025-10..2026-09). Covers cost and statistical/headcount accounts only; it does NOT contain vendor, customer/AR, revenue, or install-base data.'
metrics:
- name: VARIANCE_VS_BUDGET_EUR
  synonyms:
  - budget variance
  - variance to budget
  - act vs budget
  description: Actual minus Budget in normalized EUR. Positive = over budget (spent more than planned).
  expr: VW_JEDOX_DATA_OPEX.ACTUAL_EUR - VW_JEDOX_DATA_OPEX.BUDGET_EUR
  access_modifier: public_access
- name: VARIANCE_VS_BUDGET_PCT
  synonyms:
  - budget variance percent
  - variance pct
  description: 'Budget variance as a percentage of budget: (Actual - Budget) / Budget * 100.'
  expr: (VW_JEDOX_DATA_OPEX.ACTUAL_EUR - VW_JEDOX_DATA_OPEX.BUDGET_EUR) / NULLIF(VW_JEDOX_DATA_OPEX.BUDGET_EUR, 0) * 100
  access_modifier: public_access
