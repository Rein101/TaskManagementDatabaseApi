- name: Show the net FTE month-over-month change to see the hiring trend over the last 12 months.
  question: Show the net FTE month-over-month change to see the hiring trend over the last 12 months.
  sql: |-
    WITH monthly_fte AS (
      SELECT f.TIME, SUM(f.VAL_EUR_NORM) AS net_fte
      FROM ACC_PRD.COST_CENTER.VW_JEDOX_DATA_OPEX f
      JOIN ACC_PRD.MASTERDATA.VW_JEDOX_MASTER_DATA_ACCOUNT a ON f.ACCOUNT = a.ACCOUNT_CODE
      WHERE f.VERSION = 'Actual'
        AND a.ACCOUNT_LEVEL_1 = 'Statistical Accounts'
        AND a.ACCOUNT_LEVEL_3 ILIKE '%FTE%'
        AND f.TIME >= TO_CHAR(DATEADD(month, -12, CURRENT_DATE()), 'YYYY-MM')
      GROUP BY f.TIME
    )
    SELECT
      TIME AS PERIOD,
      ROUND(net_fte, 2) AS NET_FTE,
      ROUND(net_fte - LAG(net_fte) OVER (ORDER BY TIME), 2) AS MOM_FTE_CHANGE
    FROM monthly_fte
    ORDER BY PERIOD
